<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>从上海到秘鲁 · 开屏动画概念</title>
  <link rel="preload" as="image" href="shanghai-aerial-blue-hour.jpg" fetchpriority="high">
  <style>
    :root {
      --night: #061521;
      --ink: #0a1d25;
      --ivory: #f4efe4;
      --gold: #e4b45c;
      --route: #f3c66e;
      --duration: 9s;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; }
    body {
      color: var(--ivory);
      font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", sans-serif;
    }
    body:not(.animation-ready) *,
    body:not(.animation-ready) *::before,
    body:not(.animation-ready) *::after { animation-play-state: paused !important; }
    .experience { opacity: 0; }
    body.animation-ready .experience { opacity: 1; }
    button { font: inherit; }

    .experience {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 540px;
      isolation: isolate;
      overflow: hidden;
      background: radial-gradient(circle at 50% 42%, #18394a 0%, #071824 42%, #030b12 100%);
    }

    .destination {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #22392f;
      --far-x: 0px;
      --far-y: 0px;
      --mid-x: 0px;
      --mid-y: 0px;
      --near-x: 0px;
      --near-y: 0px;
    }
    .destination::before {
      content: "";
      position: absolute;
      inset: -4%;
      background:
        linear-gradient(180deg, rgba(3, 14, 21, .2) 0%, rgba(3, 14, 21, .06) 45%, rgba(3, 14, 21, .64) 100%),
        url("../assets/peru-itinerary/machu-picchu.jpg") center 48% / cover no-repeat;
      transform: scale(1.12);
      filter: saturate(.82) contrast(1.04);
      animation: destinationPush var(--duration) cubic-bezier(.2,.7,.2,1) both;
    }
    .destination::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 40%, transparent 22%, rgba(2, 12, 17, .18) 78%),
        linear-gradient(90deg, rgba(3, 16, 19, .25), transparent 25%, transparent 75%, rgba(3, 16, 19, .25));
    }
    .depth-layer {
      position: absolute;
      inset: -5%;
      opacity: 0;
      pointer-events: none;
      will-change: transform;
      background: url("../assets/peru-itinerary/machu-picchu.jpg") center 48% / cover no-repeat;
      animation: depthReveal var(--duration) ease both;
      transition: transform 1.1s cubic-bezier(.18,.72,.2,1);
    }
    .depth-far {
      z-index: 1;
      transform: translate3d(var(--far-x), var(--far-y), 0) scale(1.045);
      clip-path: polygon(0 0, 100% 0, 100% 61%, 72% 57%, 61% 52%, 48% 50%, 37% 54%, 27% 50%, 13% 53%, 0 55%);
      filter: saturate(.74) brightness(.94) blur(.25px);
      mask-image: linear-gradient(180deg, #000 0 78%, transparent 100%);
    }
    .depth-mid {
      z-index: 2;
      transform: translate3d(var(--mid-x), var(--mid-y), 0) scale(1.075);
      clip-path: polygon(0 19%, 8% 18%, 17% 10%, 27% 15%, 37% 51%, 57% 55%, 63% 65%, 100% 62%, 100% 82%, 0 82%);
      filter: saturate(.86) contrast(1.02);
      mask-image: linear-gradient(180deg, transparent 0, #000 17%, #000 82%, transparent 100%);
    }
    .depth-near {
      z-index: 3;
      transform: translate3d(var(--near-x), var(--near-y), 0) scale(1.115);
      clip-path: polygon(0 57%, 18% 55%, 34% 59%, 49% 53%, 65% 57%, 82% 52%, 100% 57%, 100% 100%, 0 100%);
      filter: saturate(.92) contrast(1.045);
      mask-image: linear-gradient(180deg, transparent 0, #000 25%, #000 100%);
    }
    .depth-haze {
      position: absolute;
      z-index: 4;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 52% 40%, rgba(225,238,234,.12), transparent 44%),
        linear-gradient(180deg, rgba(221,235,232,.1), transparent 47%);
      animation: hazeReveal var(--duration) ease both;
    }

    .stars, .route-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .stars { z-index: 2; opacity: 1; animation: nightFade var(--duration) ease both; }
    .route-layer { z-index: 4; }

    .shanghai-night {
      position: absolute;
      z-index: 1;
      inset: -3%;
      opacity: 1;
      transform: scale(1.04);
      background: url("shanghai-aerial-blue-hour.jpg") center 56% / cover no-repeat;
      filter: saturate(.82) contrast(1.03) brightness(.64);
      animation: shanghaiScene var(--duration) cubic-bezier(.2,.7,.2,1) both;
    }
    .shanghai-night::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(2,8,13,.74) 0%, rgba(2,8,13,.18) 44%, rgba(2,8,13,.35) 100%),
        radial-gradient(ellipse at center, transparent 22%, rgba(1,7,11,.56) 100%);
    }

    .earth-horizon {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 68%;
      width: min(1380px, 134vw);
      height: min(620px, 60vw);
      transform: translate(-50%, -50%);
      border-radius: 50% 50% 0 0;
      opacity: 0;
      border-top: 1px solid rgba(140, 198, 208, .25);
      box-shadow: 0 -28px 80px rgba(53, 131, 151, .1);
      background: radial-gradient(ellipse at 50% 0%, rgba(23, 71, 86, .22), transparent 57%);
      animation: earthWake var(--duration) ease both;
    }

    .scanner {
      position: absolute;
      z-index: 6;
      left: 12%;
      top: 0;
      width: 1px;
      height: 100%;
      opacity: 0;
      background: linear-gradient(transparent 8%, rgba(227,190,112,.08) 20%, rgba(243,205,126,.8) 50%, rgba(227,190,112,.08) 80%, transparent 92%);
      box-shadow: 0 0 18px rgba(243,205,126,.28);
      animation: scanLine var(--duration) cubic-bezier(.3,.05,.15,1) both;
    }
    .scanner::after {
      content: "SCANNING / EAST ASIA";
      position: absolute;
      top: 68%;
      left: 10px;
      white-space: nowrap;
      color: rgba(239,203,126,.56);
      font: 8px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .18em;
    }

    .city-caption {
      position: absolute;
      z-index: 4;
      left: 50%;
      bottom: 11%;
      transform: translateX(-50%);
      opacity: 0;
      color: rgba(145, 187, 193, .36);
      white-space: nowrap;
      font: 8px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .28em;
      animation: cityCaption var(--duration) ease both;
    }

    .grid {
      position: absolute;
      z-index: 1;
      width: min(1040px, 105vw);
      aspect-ratio: 2 / 1;
      left: 50%;
      top: 47%;
      transform: translate(-50%, -50%) perspective(700px) rotateX(61deg);
      border-radius: 50%;
      opacity: .24;
      background:
        repeating-radial-gradient(ellipse at center, transparent 0 46px, rgba(171, 208, 208, .25) 47px 48px),
        repeating-linear-gradient(90deg, transparent 0 79px, rgba(171, 208, 208, .18) 80px 81px);
      mask-image: radial-gradient(ellipse, #000 20%, transparent 71%);
      animation: gridFade var(--duration) ease both;
    }

    .origin {
      position: absolute;
      z-index: 5;
      left: 50%;
      top: 49%;
      width: min(520px, calc(100% - 48px));
      transform: translate(-50%, -50%);
      text-align: center;
      animation: originMove var(--duration) cubic-bezier(.45,0,.18,1) both;
    }
    .origin .pin {
      position: relative;
      width: 8px;
      height: 8px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 7px rgba(228,180,92,.12), 0 0 30px 8px rgba(228,180,92,.56);
    }
    .origin .pin::before,
    .origin .pin::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 30px;
      height: 30px;
      border: 1px solid rgba(228,180,92,.55);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(.25);
      animation: lockPulse 1.35s ease-out 1.1s 2;
    }
    .origin .pin::after { animation-delay: 1.42s; }
    .origin .city, .arrival .city {
      display: block;
      letter-spacing: .42em;
      font-size: clamp(18px, 2vw, 27px);
      font-weight: 500;
    }
    .origin .coords, .arrival .coords {
      display: block;
      margin-top: 10px;
      color: rgba(240,239,226,.62);
      font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .18em;
    }

    .flight-copy {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: 14%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: rgba(245,240,226,.7);
      font-size: 10px;
      letter-spacing: .32em;
      text-transform: uppercase;
      animation: flightCopy var(--duration) ease both;
    }
    .flight-copy b { color: var(--gold); font-weight: 500; }

    .arrival {
      position: absolute;
      z-index: 7;
      left: 50%;
      top: 45%;
      width: min(820px, calc(100% - 40px));
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      animation: arrivalIn var(--duration) cubic-bezier(.2,.7,.2,1) both;
    }
    .arrival .eyebrow {
      margin: 0 0 17px;
      color: #f0c874;
      font-size: 11px;
      letter-spacing: .36em;
      text-transform: uppercase;
    }
    .arrival h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: clamp(52px, 8.4vw, 124px);
      font-weight: 400;
      line-height: .9;
      letter-spacing: -.045em;
      text-shadow: 0 3px 30px rgba(0,0,0,.22);
    }
    .arrival .subtitle {
      margin: 24px 0 0;
      font-size: clamp(13px, 1.4vw, 17px);
      letter-spacing: .22em;
      text-shadow: 0 2px 14px rgba(0,0,0,.35);
    }
    .arrival .rule {
      width: 1px;
      height: 46px;
      margin: 23px auto 0;
      background: linear-gradient(var(--gold), transparent);
    }

    .cloud {
      position: absolute;
      z-index: 6;
      top: -18%;
      width: 76%;
      height: 136%;
      overflow: hidden;
      filter: blur(3px) saturate(.78) contrast(1.08);
      opacity: 0;
      will-change: transform, opacity;
      background:
        linear-gradient(90deg, rgba(11,25,39,.18), rgba(237,242,240,.13) 45%, rgba(6,18,31,.2)),
        url("../assets/peru-itinerary/cloudscape-texture.jpg") center / cover no-repeat;
      mix-blend-mode: screen;
      -webkit-mask-image: radial-gradient(ellipse at center, #000 0 54%, rgba(0,0,0,.88) 66%, transparent 86%);
      mask-image: radial-gradient(ellipse at center, #000 0 54%, rgba(0,0,0,.88) 66%, transparent 86%);
    }
    .cloud::after {
      content: "";
      position: absolute;
      inset: -10%;
      background: inherit;
      background-position: 68% 42%;
      opacity: .36;
      transform: scale(1.08);
      animation: cloudTextureDrift 6.5s ease-in-out infinite alternate;
    }
    .cloud.left { left: -27%; transform-origin: left center; animation: cloudLeft var(--duration) cubic-bezier(.55,.06,.2,1) both; }
    .cloud.right { right: -27%; transform: scaleX(-1); transform-origin: right center; animation: cloudRight var(--duration) cubic-bezier(.55,.06,.2,1) both; }

    .cloud-far {
      z-index: 5;
      top: -8%;
      left: -8%;
      width: 116%;
      filter: blur(12px) saturate(.66) brightness(.72);
      opacity: 0;
      transform: scale(1.18);
      background-position: 50% 28%;
      animation: cloudFar var(--duration) ease both;
    }
    .cloud-near {
      z-index: 8;
      top: auto;
      bottom: -41%;
      width: 92%;
      height: 88%;
      filter: blur(5px) saturate(.72) contrast(1.1) brightness(.92);
      background:
        linear-gradient(180deg, rgba(20,38,53,.08), rgba(239,242,235,.3)),
        url("../assets/peru-itinerary/cloudscape-texture.jpg") 50% 78% / 138% auto no-repeat;
    }
    .cloud-near.left { left: -38%; animation: cloudNearLeft var(--duration) cubic-bezier(.3,.65,.15,1) both; }
    .cloud-near.right { right: -38%; animation: cloudNearRight var(--duration) cubic-bezier(.3,.65,.15,1) both; }

    .cloud-cover {
      position: absolute;
      z-index: 7;
      inset: -18%;
      opacity: 0;
      filter: blur(7px) saturate(.7) brightness(.96) contrast(1.08);
      background:
        radial-gradient(ellipse at center, rgba(238,244,241,.2), rgba(13,31,45,.12) 62%, transparent 78%),
        url("../assets/peru-itinerary/cloudscape-texture.jpg") center / cover no-repeat;
      mix-blend-mode: screen;
      animation: cloudCover var(--duration) ease both;
    }
    @keyframes cloudTextureDrift {
      from { transform: scale(1.08) translate3d(-1.5%, -.5%, 0); }
      to { transform: scale(1.14) translate3d(2%, 1%, 0); }
    }
    .reveal-slit {
      position: absolute;
      z-index: 9;
      left: 50%;
      top: 2%;
      width: 18vw;
      min-width: 150px;
      height: 96%;
      opacity: 0;
      transform: translateX(-50%) scale(.7, .86);
      filter: blur(18px);
      background: radial-gradient(ellipse at center, rgba(235,245,239,.7) 0%, rgba(204,224,220,.34) 29%, rgba(175,207,205,.12) 52%, transparent 73%);
      animation: slitOpen var(--duration) cubic-bezier(.16,.7,.18,1) both;
    }

    .grain {
      position: absolute;
      z-index: 10;
      inset: 0;
      pointer-events: none;
      opacity: .07;
      background-image:
        repeating-radial-gradient(circle at 19% 31%, #fff 0 .35px, transparent .5px 4px),
        repeating-radial-gradient(circle at 73% 67%, #fff 0 .3px, transparent .55px 5px);
      background-size: 7px 9px, 11px 13px;
      mix-blend-mode: soft-light;
    }

    .topline {
      position: absolute;
      z-index: 11;
      top: 25px;
      left: 28px;
      right: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(248,244,231,.7);
      font-size: 10px;
      letter-spacing: .24em;
      text-transform: uppercase;
    }
    .counter::after { content: "00:09"; animation: counter var(--duration) steps(1,end) both; }

    .controls {
      position: absolute;
      z-index: 12;
      right: 25px;
      bottom: 24px;
      display: flex;
      gap: 9px;
    }
    .controls button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      background: rgba(4,17,23,.28);
      color: rgba(255,255,255,.82);
      padding: 9px 14px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      font-size: 11px;
      letter-spacing: .12em;
      transition: background .2s, color .2s;
    }
    .controls button:hover { background: rgba(255,255,255,.14); color: #fff; }
    .controls button:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

    .experience.finished .origin,
    .experience.finished .flight-copy,
    .experience.finished .stars,
    .experience.finished .grid,
    .experience.finished .route-layer { display: none; }
    .experience.finished .earth-horizon,
    .experience.finished .scanner,
    .experience.finished .shanghai-night,
    .experience.finished .city-caption,
    .experience.finished .cloud-far,
    .experience.finished .cloud-near,
    .experience.finished .cloud-cover,
    .experience.finished .reveal-slit { display: none; }
    .experience.finished .cloud.left { animation: none; opacity: 0; transform: translateX(-64%) scale(1.1); }
    .experience.finished .cloud.right { animation: none; opacity: 0; transform: translateX(64%) scaleX(-1) scale(1.1); }
    .experience.finished .arrival { animation: none; opacity: 1; transform: translate(-50%, -50%); }
    .experience.finished .destination::before { animation: none; transform: scale(1.03); }
    .experience.finished .depth-layer { animation: none; opacity: .96; }
    .experience.finished .depth-haze { animation: none; opacity: 1; }

    @keyframes nightFade { 0%, 55% { opacity: 1; } 72%, 100% { opacity: 0; } }
    @keyframes shanghaiScene { 0% { opacity: 1; transform: scale(1.04); filter: saturate(.82) contrast(1.03) brightness(.64); } 39% { opacity: 1; transform: scale(1.025); filter: saturate(.82) contrast(1.03) brightness(.64); } 55%, 100% { opacity: 0; transform: scale(1); filter: saturate(.72) contrast(1.02) brightness(.26); } }
    @keyframes earthWake { 0%, 3% { opacity: 0; transform: translate(-50%, -46%) scale(.98); } 14%, 47% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 62%, 100% { opacity: 0; transform: translate(-50%, -54%) scale(1.03); } }
    @keyframes scanLine { 0%, 5% { left: 10%; opacity: 0; } 9% { opacity: 1; } 24% { left: 50%; opacity: .85; } 31%, 100% { left: 72%; opacity: 0; } }
    @keyframes cityCaption { 0%, 10% { opacity: 0; } 19%, 39% { opacity: 1; } 53%, 100% { opacity: 0; } }
    @keyframes lockPulse { 0% { opacity: 0; transform: translate(-50%, -50%) scale(.25); } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.8); } }
    @keyframes gridFade { 0% { opacity: 0; } 8%, 44% { opacity: .24; } 63%, 100% { opacity: 0; } }
    @keyframes destinationPush { 0%, 54% { transform: scale(1.14); filter: brightness(.18) saturate(.55); } 77% { filter: brightness(.82) saturate(.75); } 100% { transform: scale(1.03); filter: brightness(1) saturate(.82); } }
    @keyframes depthReveal { 0%, 64% { opacity: 0; } 76% { opacity: .38; } 100% { opacity: .92; } }
    @keyframes hazeReveal { 0%, 67% { opacity: 0; } 83%, 100% { opacity: 1; } }
    @keyframes originMove { 0% { opacity: 0; transform: translate(-50%, -43%) scale(.96); } 9%, 23% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 38%, 100% { opacity: 0; transform: translate(-50%, -61%) scale(.94); } }
    @keyframes flightCopy { 0%, 22% { opacity: 0; } 29%, 49% { opacity: 1; } 59%, 100% { opacity: 0; } }
    @keyframes arrivalIn { 0%, 67% { opacity: 0; transform: translate(-50%, -42%) scale(.97); } 86%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    @keyframes cloudLeft { 0%, 40% { opacity: 0; transform: translateX(-18%) scale(1.08); } 51% { opacity: .76; transform: translateX(18%) scale(1.08); } 72%, 100% { opacity: 0; transform: translateX(-64%) scale(1.14); } }
    @keyframes cloudRight { 0%, 40% { opacity: 0; transform: translateX(18%) scaleX(-1) scale(1.08); } 51% { opacity: .76; transform: translateX(-18%) scaleX(-1) scale(1.08); } 72%, 100% { opacity: 0; transform: translateX(64%) scaleX(-1) scale(1.14); } }
    @keyframes cloudFar { 0%, 34% { opacity: 0; transform: scale(1.25) translateY(8%); } 48%, 59% { opacity: .58; transform: scale(1.15) translateY(0); } 77%, 100% { opacity: 0; transform: scale(1.05) translateY(-7%); } }
    @keyframes cloudCover { 0%, 43% { opacity: 0; transform: scale(1.16); } 51%, 57% { opacity: .66; transform: scale(1.06); } 69%, 100% { opacity: 0; transform: scale(1.28); } }
    @keyframes slitOpen { 0%, 53% { opacity: 0; transform: translateX(-50%) scale(.7,.86); } 59% { opacity: .66; transform: translateX(-50%) scale(1,1); } 68% { opacity: .38; transform: translateX(-50%) scale(2.3,1.08); } 79%, 100% { opacity: 0; transform: translateX(-50%) scale(4.2,1.16); } }
    @keyframes cloudNearLeft { 0%, 48% { opacity: 0; transform: translate(-28%, 24%) scale(1.25); } 57% { opacity: .74; transform: translate(12%, -8%) scale(1.12); } 77%, 100% { opacity: 0; transform: translate(-75%, -20%) scale(1.45); } }
    @keyframes cloudNearRight { 0%, 48% { opacity: 0; transform: translate(28%, 24%) scaleX(-1) scale(1.25); } 57% { opacity: .74; transform: translate(-12%, -8%) scaleX(-1) scale(1.12); } 77%, 100% { opacity: 0; transform: translate(75%, -20%) scaleX(-1) scale(1.45); } }
    @keyframes counter {
      0% { content: "00:09"; } 11% { content: "00:08"; } 22% { content: "00:07"; }
      33% { content: "00:06"; } 44% { content: "00:05"; } 55% { content: "00:04"; }
      66% { content: "00:03"; } 77% { content: "00:02"; } 88% { content: "00:01"; } 100% { content: "00:00"; }
    }

    @media (max-width: 700px) {
      .experience { min-height: 440px; }
      .topline { top: 18px; left: 18px; right: 18px; }
      .flight-copy { bottom: 17%; font-size: 9px; letter-spacing: .2em; }
      .arrival .eyebrow { letter-spacing: .26em; }
      .arrival h1 { font-size: clamp(58px, 20vw, 88px); }
      .arrival .subtitle { line-height: 1.8; }
      .controls { right: 16px; bottom: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-delay: 0ms !important; }
      .stars, .grid, .route-layer, .origin, .flight-copy, .cloud { display: none; }
      .earth-horizon, .scanner, .shanghai-night, .city-caption, .cloud-far, .cloud-near, .cloud-cover, .reveal-slit { display: none; }
      .arrival { opacity: 1; transform: translate(-50%, -50%); }
      .destination::before { transform: scale(1.03); filter: saturate(.82); }
      .depth-layer { display: none; }
    }
  </style>
</head>
<body>
  <script>
    (() => {
      const firstFrame = new Image();
      firstFrame.src = 'shanghai-aerial-blue-hour.jpg';
      const reveal = () => {
        document.body.classList.add('animation-ready');
        window.parent.postMessage({ type: 'peru-opening-ready' }, '*');
      };
      if (typeof firstFrame.decode === 'function') firstFrame.decode().then(reveal, reveal);
      else if (firstFrame.complete) reveal();
      else {
        firstFrame.addEventListener('load', reveal, { once: true });
        firstFrame.addEventListener('error', reveal, { once: true });
      }
    })();
  </script>
  <main class="experience" id="experience" aria-label="从上海飞往秘鲁的开屏动画">
    <div class="destination" id="destination" aria-hidden="true">
      <div class="depth-layer depth-far"></div>
      <div class="depth-layer depth-mid"></div>
      <div class="depth-layer depth-near"></div>
      <div class="depth-haze"></div>
    </div>
    <div class="shanghai-night" aria-hidden="true"></div>
    <div class="earth-horizon" aria-hidden="true"></div>
    <canvas class="stars" id="stars" aria-hidden="true"></canvas>
    <div class="grid" aria-hidden="true"></div>
    <canvas class="route-layer" id="route" aria-hidden="true"></canvas>
    <div class="scanner" aria-hidden="true"></div>
    <div class="city-caption" aria-hidden="true">THE BUND · HUANGPU RIVER · LUJIAZUI</div>

    <section class="origin" aria-label="起点上海">
      <div class="pin"></div>
      <span class="city">SHANGHAI</span>
      <span class="coords">31.2304° N · 121.4737° E · UTC+8</span>
    </section>

    <p class="flight-copy">Shanghai <b>→</b> Lima · across the Pacific · UTC+8 <b>→</b> UTC−5</p>

    <div class="cloud cloud-far" aria-hidden="true"></div>
    <div class="cloud left" aria-hidden="true"></div>
    <div class="cloud right" aria-hidden="true"></div>
    <div class="cloud-cover" aria-hidden="true"></div>
    <div class="cloud cloud-near left" aria-hidden="true"></div>
    <div class="cloud cloud-near right" aria-hidden="true"></div>
    <div class="reveal-slit" aria-hidden="true"></div>

    <section class="arrival" aria-label="抵达秘鲁">
      <p class="eyebrow">16 days · from rainforest to highlands</p>
      <h1>秘鲁</h1>
      <p class="subtitle">雨林到高原 · 2026.09.22—10.07</p>
      <div class="rule" aria-hidden="true"></div>
    </section>

    <div class="grain" aria-hidden="true"></div>
    <div class="topline" aria-hidden="true">
      <span>Departure · PVG</span>
      <span class="counter"></span>
    </div>
    <div class="controls">
      <button type="button" id="replay">重播</button>
      <button type="button" id="skip">揭幕</button>
    </div>
  </main>

  <script>
    const experience = document.getElementById('experience');
    const destination = document.getElementById('destination');
    const routeCanvas = document.getElementById('route');
    const starsCanvas = document.getElementById('stars');
    const routeCtx = routeCanvas.getContext('2d');
    const starsCtx = starsCanvas.getContext('2d');
    const duration = 9000;
    let startedAt = performance.now();
    let frame;
    let stars = [];
    let pointerX = 0;
    let pointerY = 0;
    let easedX = 0;
    let easedY = 0;

    function sizeCanvases() {
      const dpr = Math.min(devicePixelRatio || 1, 2);
      [routeCanvas, starsCanvas].forEach(canvas => {
        canvas.width = innerWidth * dpr;
        canvas.height = innerHeight * dpr;
        canvas.style.width = `${innerWidth}px`;
        canvas.style.height = `${innerHeight}px`;
        canvas.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
      });
      const random = mulberry32(20260922);
      stars = Array.from({ length: Math.round(Math.min(210, innerWidth / 7)) }, () => ({
        x: random() * innerWidth,
        y: random() * innerHeight * .82,
        r: random() * 1.25 + .2,
        a: random() * .65 + .18,
        phase: random() * Math.PI * 2
      }));
    }

    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function cubicPoint(t, p0, p1, p2, p3) {
      const u = 1 - t;
      return {
        x: u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x,
        y: u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y
      };
    }

    function draw(now) {
      const elapsed = now - startedAt;
      const progress = Math.max(0, Math.min(1, elapsed / duration));
      const nightOpacity = progress < .55 ? 1 : Math.max(0, 1 - (progress - .55) / .18);

      starsCtx.clearRect(0, 0, innerWidth, innerHeight);
      stars.forEach(star => {
        const twinkle = .72 + Math.sin(now * .0015 + star.phase) * .28;
        starsCtx.beginPath();
        starsCtx.fillStyle = `rgba(222,235,229,${star.a * twinkle * nightOpacity})`;
        starsCtx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        starsCtx.fill();
      });

      routeCtx.clearRect(0, 0, innerWidth, innerHeight);
      const start = { x: innerWidth * .2, y: innerHeight * .61 };
      const end = { x: innerWidth * .8, y: innerHeight * .43 };
      const c1 = { x: innerWidth * .39, y: innerHeight * .15 };
      const c2 = { x: innerWidth * .63, y: innerHeight * .16 };
      const routeProgress = Math.max(0, Math.min(1, (progress - .22) / .31));

      if (routeProgress > 0 && nightOpacity > 0) {
        routeCtx.lineCap = 'round';
        routeCtx.beginPath();
        for (let i = 0; i <= 90 * routeProgress; i++) {
          const p = cubicPoint(i / 90, start, c1, c2, end);
          i ? routeCtx.lineTo(p.x, p.y) : routeCtx.moveTo(p.x, p.y);
        }
        const gradient = routeCtx.createLinearGradient(start.x, 0, end.x, 0);
        gradient.addColorStop(0, 'rgba(226,180,92,.05)');
        gradient.addColorStop(.7, 'rgba(237,195,108,.65)');
        gradient.addColorStop(1, 'rgba(255,226,160,.95)');
        routeCtx.strokeStyle = gradient;
        routeCtx.lineWidth = 1.25;
        routeCtx.shadowColor = 'rgba(244,196,99,.65)';
        routeCtx.shadowBlur = 10;
        routeCtx.stroke();

        const point = cubicPoint(routeProgress, start, c1, c2, end);
        const ahead = cubicPoint(Math.min(1, routeProgress + .01), start, c1, c2, end);
        const angle = Math.atan2(ahead.y - point.y, ahead.x - point.x);
        routeCtx.save();
        routeCtx.translate(point.x, point.y);
        routeCtx.rotate(angle);
        routeCtx.fillStyle = '#ffe0a0';
        routeCtx.shadowBlur = 18;
        routeCtx.beginPath();
        routeCtx.moveTo(9, 0);
        routeCtx.lineTo(-5, -3.2);
        routeCtx.lineTo(-2, 0);
        routeCtx.lineTo(-5, 3.2);
        routeCtx.closePath();
        routeCtx.fill();
        routeCtx.restore();

        if (routeProgress > .86) {
          const pulse = 5 + Math.sin(now * .006) * 2;
          routeCtx.beginPath();
          routeCtx.arc(end.x, end.y, pulse, 0, Math.PI * 2);
          routeCtx.strokeStyle = `rgba(243,198,110,${nightOpacity * .7})`;
          routeCtx.lineWidth = 1;
          routeCtx.stroke();
          routeCtx.fillStyle = '#f3c66e';
          routeCtx.beginPath();
          routeCtx.arc(end.x, end.y, 2.6, 0, Math.PI * 2);
          routeCtx.fill();
        }
      }

      if (progress > .62) {
        easedX += (pointerX - easedX) * .055;
        easedY += (pointerY - easedY) * .055;
        const idleX = Math.sin(now * .00022) * 1.8;
        const idleY = Math.cos(now * .00018) * 1.1;
        destination.style.setProperty('--far-x', `${-easedX * 3 + idleX}px`);
        destination.style.setProperty('--far-y', `${-easedY * 2 + idleY}px`);
        destination.style.setProperty('--mid-x', `${-easedX * 8 + idleX * 1.5}px`);
        destination.style.setProperty('--mid-y', `${-easedY * 5 + idleY * 1.5}px`);
        destination.style.setProperty('--near-x', `${-easedX * 17 + idleX * 2.2}px`);
        destination.style.setProperty('--near-y', `${-easedY * 10 + idleY * 2.2}px`);
      }

      if (!experience.classList.contains('finished')) frame = requestAnimationFrame(draw);
    }

    function replay() {
      cancelAnimationFrame(frame);
      experience.classList.remove('finished');
      experience.style.display = 'none';
      void experience.offsetWidth;
      experience.style.display = '';
      startedAt = performance.now();
      frame = requestAnimationFrame(draw);
    }

    function finish() {
      cancelAnimationFrame(frame);
      experience.classList.add('finished');
      routeCtx.clearRect(0, 0, innerWidth, innerHeight);
      starsCtx.clearRect(0, 0, innerWidth, innerHeight);
    }

    document.getElementById('replay').addEventListener('click', replay);
    document.getElementById('skip').addEventListener('click', finish);
    experience.addEventListener('pointermove', event => {
      pointerX = (event.clientX / innerWidth - .5) * 2;
      pointerY = (event.clientY / innerHeight - .5) * 2;
    });
    experience.addEventListener('pointerleave', () => {
      pointerX = 0;
      pointerY = 0;
    });
    experience.addEventListener('animationend', event => {
      if (event.animationName === 'arrivalIn') experience.setAttribute('data-complete', 'true');
    });
    addEventListener('resize', sizeCanvases);
    sizeCanvases();
    frame = requestAnimationFrame(draw);
  </script>
</body>
</html>
